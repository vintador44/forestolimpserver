version: '3.8'

services:
  # Node.js сервер
  server:
    build: ./server
    container_name: node_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_USER=postgres
      - DB_HOST=database                    # ✅ уже правильно
      - DB_NAME=postgres
      - DB_PASSWORD=Kiillofs2
      - DB_PORT=5432
      - JWT_ACCESS_SECRET=fee6a07fb0cd4aa693145c2637d6ef922d304787b88f91150e3db6d87769cf2c
      - JWT_REFRESH_SECRET=ab6c17badf71d8c53302d7fa57f6a89a75dcfe00460ecf2ad7fa0338a4ec234a
      - SMTP_HOST=smtp.yandex.ru
      - SMTP_PORT=587
      - SMTP_USER=maximMOAIS@yandex.ru
      - SMTP_PASSWORD=yyrpeczbmobhqtva
      - API_URL=http://localhost:5000
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy  # ⬅️ ИЗМЕНИТЬ ЗДЕСЬ!
    networks:
      - app-network
    command: sh -c "sleep 30 && npm run dev"  # ⬅️ ИЗМЕНИТЬ ЗДЕСЬ!

  # PostgreSQL с PostGIS
  database:
    image: postgis/postgis:15-3.3-alpine  # ✅ уже правильно
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: speedplus
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s     # ⬅️ уменьшил интервал
      timeout: 5s
      retries: 15      # ⬅️ увеличил попытки
      start_period: 30s  # ⬅️ ДОБАВИТЬ!

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - database
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local